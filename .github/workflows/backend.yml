name: Deploy Backends

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backends: ${{ steps.changed.outputs.backends }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve diff range
        id: range
        shell: bash
        run: |
          EMPTY_TREE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "base=$EMPTY_TREE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
          echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Detect changed scopes
        id: changed
        run: pnpm exec tsx scripts/github/changed-scopes.ts --base "${{ steps.range.outputs.base }}" --head "${{ steps.range.outputs.head }}"

  publish-and-deploy:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.backends != '[]'
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.detect.outputs.backends) }}
    environment:
      name: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_BASE_PATH: ${{ secrets.DEPLOY_BASE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve backend metadata
        id: meta
        shell: bash
        run: |
          BACKEND_PATH="${{ matrix.path }}"
          GAME="$(echo "$BACKEND_PATH" | cut -d/ -f1)"
          TOOL="$(echo "$BACKEND_PATH" | cut -d/ -f2)"
          SERVICE_SLUG="${GAME}-${TOOL}-backend"
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${SERVICE_SLUG}:${{ github.sha }}"
          echo "game=$GAME" >> "$GITHUB_OUTPUT"
          echo "tool=$TOOL" >> "$GITHUB_OUTPUT"
          echo "service_slug=$SERVICE_SLUG" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ steps.meta.outputs.service_slug }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Copy deploy files
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_PORT != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_BASE_PATH != '' }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          source: "${{ matrix.path }}/deploy/compose.yaml,${{ matrix.path }}/.env.production.example"
          strip_components: 3
          target: "${{ secrets.DEPLOY_BASE_PATH }}/${{ steps.meta.outputs.game }}/${{ steps.meta.outputs.tool }}/backend"

      - name: Deploy on server
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_PORT != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_BASE_PATH != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          command_timeout: 30m
          script: |
            set -eu
            TARGET_DIR="${{ secrets.DEPLOY_BASE_PATH }}/${{ steps.meta.outputs.game }}/${{ steps.meta.outputs.tool }}/backend"
            mkdir -p "$TARGET_DIR/deploy"
            if [ ! -f "$TARGET_DIR/.env.production" ] && [ -f "$TARGET_DIR/.env.production.example" ]; then
              cp "$TARGET_DIR/.env.production.example" "$TARGET_DIR/.env.production"
            fi
            cd "$TARGET_DIR"
            IMAGE_REF="${{ steps.meta.outputs.image_ref }}" docker compose -f deploy/compose.yaml pull
            IMAGE_REF="${{ steps.meta.outputs.image_ref }}" docker compose -f deploy/compose.yaml up -d
