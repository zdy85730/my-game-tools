name: Deploy Backends

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backends: ${{ steps.changed.outputs.backends }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve diff range
        id: range
        shell: bash
        run: |
          EMPTY_TREE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "base=$EMPTY_TREE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
          echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Detect changed scopes
        id: changed
        run: pnpm exec tsx scripts/github/changed-scopes.ts --base "${{ steps.range.outputs.base }}" --head "${{ steps.range.outputs.head }}"

  publish-and-deploy:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.backends != '[]'
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.detect.outputs.backends) }}
    environment:
      name: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_BASE_PATH: ${{ secrets.DEPLOY_BASE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve backend metadata
        id: meta
        shell: bash
        run: |
          BACKEND_PATH="${{ matrix.path }}"
          GAME="$(echo "$BACKEND_PATH" | cut -d/ -f1)"
          TOOL="$(echo "$BACKEND_PATH" | cut -d/ -f2)"
          SERVICE_SLUG="${GAME}-${TOOL}-backend"
          DEFAULT_PORT="$(awk -F= '/^PORT=/{print $2; exit}' "$BACKEND_PATH/.env.production.example")"
          echo "game=$GAME" >> "$GITHUB_OUTPUT"
          echo "tool=$TOOL" >> "$GITHUB_OUTPUT"
          echo "service_slug=$SERVICE_SLUG" >> "$GITHUB_OUTPUT"
          echo "default_port=$DEFAULT_PORT" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_PORT != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_BASE_PATH != '' }}
        id: ssh
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/deploy-ssh" "$HOME/.ssh"
          key_path="$RUNNER_TEMP/deploy-ssh/id_ed25519"
          known_hosts_path="$RUNNER_TEMP/deploy-ssh/known_hosts"
          printf '%s' "$DEPLOY_SSH_KEY" > "$key_path"
          chmod 600 "$key_path"
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" > "$known_hosts_path"
          if ! ssh-keygen -lf "$known_hosts_path" -E sha256 | awk '{print $2}' | grep -Fx "${{ secrets.DEPLOY_FINGERPRINT }}" >/dev/null; then
            echo "Host key fingerprint did not match ${DEPLOY_HOST}:${DEPLOY_PORT}" >&2
            ssh-keygen -lf "$known_hosts_path" -E sha256 >&2
            exit 1
          fi
          cp "$known_hosts_path" "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          echo "key_path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Deploy backend over SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_PORT != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_BASE_PATH != '' }}
        env:
          BACKEND_PATH: ${{ matrix.path }}
          GAME: ${{ steps.meta.outputs.game }}
          TOOL: ${{ steps.meta.outputs.tool }}
          SERVICE_SLUG: ${{ steps.meta.outputs.service_slug }}
          DEFAULT_PORT: ${{ steps.meta.outputs.default_port }}
          DEPLOY_SSH_KEY_PATH: ${{ steps.ssh.outputs.key_path }}
        shell: bash
        run: bash scripts/github/deploy-backend-remote.sh
